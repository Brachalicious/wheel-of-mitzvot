kind = "mobile"
previewPath = "/mobile/"
title = "Mitzvah Wheel Mobile"
version = "1.0.0"
id = "artifacts/mitzvah-wheel-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24963

[services.development]
run = "pnpm --filter @workspace/mitzvah-wheel-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mitzvah-wheel-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mitzvah-wheel-mobile", "run", "serve" ]

[services.env]
PORT = "24963"
BASE_PATH = "/mobile/"
